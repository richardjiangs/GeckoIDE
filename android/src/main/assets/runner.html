<!doctype html>
<meta charset="utf-8">
<script src="pyodide/pyodide.js"></script>
<script src="go/wasm_exec.js"></script>
<script>
let pyodidePromise = null;
let goPromise = null;
let goReadyResolve = null;

function send(kind, message) {
  if (kind === "go-ready" && goReadyResolve) {
    goReadyResolve();
    goReadyResolve = null;
    return;
  }
  try {
    AndroidRunner.postMessage(JSON.stringify({ kind, message: String(message ?? "") }));
  } catch (err) {
  }
}
window.GeskoRunnerSend = send;

function basicTypeScriptToJavaScript(source) {
  return source
    .replace(/^\s*interface\s+\w+\s*\{[\s\S]*?\}\s*/gm, "")
    .replace(/^\s*type\s+\w+\s*=\s*[^;\n]+;?\s*/gm, "")
    .replace(/:\s*(?:void|string|number|boolean|object|any|unknown|never|bigint|symbol|[A-Z][A-Za-z0-9_<>,\s\[\]\|&.?]*)\s*(?=[,)=;{])/g, "")
    .replace(/\)\s*:\s*(?:void|string|number|boolean|object|any|unknown|never|bigint|symbol|[A-Z][A-Za-z0-9_<>,\s\[\]\|&.?]*)\s*\{/g, ") {")
    .replace(/\b(?:public|private|protected|readonly|declare)\s+/g, "");
}

async function getPyodideRuntime() {
  if (!pyodidePromise) {
    send("info", "Loading bundled Python runtime...\n");
    pyodidePromise = loadPyodide({ indexURL: "pyodide/" });
  }
  return await pyodidePromise;
}

async function getGoRuntime() {
  if (!goPromise) {
    send("info", "Loading bundled Go interpreter...\n");
    goPromise = new Promise(async (resolve, reject) => {
      try {
        goReadyResolve = resolve;
        const go = new Go();
        const response = await fetch("go/gesko-go-runner.wasm");
        const bytes = await response.arrayBuffer();
        const result = await WebAssembly.instantiate(bytes, go.importObject);
        go.run(result.instance).catch((err) => send("err", String(err) + "\n"));
      } catch (err) {
        reject(err);
      }
    });
  }
  return await goPromise;
}

async function runPython(code) {
  try {
    const pyodide = await getPyodideRuntime();
    pyodide.setStdout({ batched: (text) => send("out", text + "\n") });
    pyodide.setStderr({ batched: (text) => send("err", text + "\n") });
    await pyodide.runPythonAsync(code);
    send("done", "0");
  } catch (err) {
    send("err", (err && err.stack ? err.stack : err) + "\n");
    send("done", "1");
  }
}

async function checkPython(code) {
  try {
    const pyodide = await getPyodideRuntime();
    pyodide.globals.set("__gesko_source__", code);
    await pyodide.runPythonAsync('compile(__gesko_source__, "<geskoide>", "exec")');
    send("check-ok", "Python syntax OK.\n");
    send("check-done", "0");
  } catch (err) {
    send("check-err", "Python syntax error: " + (err && err.message ? err.message : err) + "\n");
    send("check-done", "1");
  }
}

async function debugPython(code) {
  try {
    const pyodide = await getPyodideRuntime();
    pyodide.setStdout({ batched: (text) => send("out", text + "\n") });
    pyodide.setStderr({ batched: (text) => send("err", text + "\n") });
    pyodide.globals.set("__gesko_source__", code);
    await pyodide.runPythonAsync(`
import sys
source = __gesko_source__
lines = source.splitlines()

def __gesko_trace(frame, event, arg):
    if frame.f_code.co_filename == "<geskoide>" and event == "line":
        lineno = frame.f_lineno
        text = lines[lineno - 1].strip() if 0 < lineno <= len(lines) else ""
        print(f"[debug] line {lineno}: {text}")
        visible = []
        for key, value in frame.f_locals.items():
            if key.startswith("__"):
                continue
            try:
                visible.append(f"{key}={repr(value)[:80]}")
            except Exception:
                visible.append(f"{key}=<unprintable>")
            if len(visible) >= 6:
                break
        if visible:
            print("        locals: " + ", ".join(visible))
    return __gesko_trace

compiled = compile(source, "<geskoide>", "exec")
globals_map = {"__name__": "__main__"}
sys.settrace(__gesko_trace)
try:
    exec(compiled, globals_map, globals_map)
finally:
    sys.settrace(None)
`);
    send("done", "0");
  } catch (err) {
    send("err", (err && err.stack ? err.stack : err) + "\n");
    send("done", "1");
  }
}

async function checkJavaScript(code, mode) {
  try {
    const runnable = mode === "typescript" ? basicTypeScriptToJavaScript(code) : code;
    new Function('"use strict"; return (async function(){\n' + runnable + '\n});');
    send("check-ok", (mode === "typescript" ? "TypeScript" : "JavaScript") + " syntax OK.\n");
    send("check-done", "0");
  } catch (err) {
    send("check-err", (mode === "typescript" ? "TypeScript" : "JavaScript")
      + " syntax error: " + (err && err.message ? err.message : err) + "\n");
    send("check-done", "1");
  }
}

async function debugJavaScript(code, mode) {
  const runnable = mode === "typescript" ? basicTypeScriptToJavaScript(code) : code;
  send("debug", "Static line trace before execution:\n");
  runnable.split(/\r?\n/).forEach((line, index) => {
    const trimmed = line.trim();
    if (trimmed && !trimmed.startsWith("//")) {
      send("debug", "[debug] line " + (index + 1) + ": " + trimmed.slice(0, 140) + "\n");
    }
  });
  await runJavaScript(code, mode);
}

async function runJavaScript(code, mode) {
  const originalConsole = window.console;
  const log = (kind, args) => send(kind, args.map((x) => {
    if (typeof x === "string") return x;
    try { return JSON.stringify(x); } catch (err) { return String(x); }
  }).join(" ") + "\n");
  window.console = {
    log: (...args) => log("out", args),
    info: (...args) => log("out", args),
    warn: (...args) => log("err", args),
    error: (...args) => log("err", args)
  };
  try {
    const runnable = mode === "typescript" ? basicTypeScriptToJavaScript(code) : code;
    const fn = new Function('"use strict"; return (async function(){\n' + runnable + '\n})();');
    const result = await fn();
    if (result !== undefined) send("out", String(result) + "\n");
    send("done", "0");
  } catch (err) {
    send("err", (err && err.stack ? err.stack : err) + "\n");
    send("done", "1");
  } finally {
    window.console = originalConsole;
  }
}

async function runGo(code) {
  try {
    await getGoRuntime();
    window.GeskoRunGo(code);
  } catch (err) {
    send("err", (err && err.stack ? err.stack : err) + "\n");
    send("done", "1");
  }
}

const polyglotNames = {
  c: "C",
  cpp: "C++",
  csharp: "C#",
  java: "Java",
  rust: "Rust",
  ruby: "Ruby",
  php: "PHP",
  swift: "Swift",
  kotlin: "Kotlin",
  lua: "Lua",
  yaml: "YAML",
  applescript: "AppleScript",
  perl: "Perl",
  text: "Plain Text"
};

function stripPolyglotNoise(source, langId) {
  const rawLines = source
    .replace(/\u00ab\u00bb/g, "")
    .replace(/^\s*<\?(?:php)?/gmi, "")
    .replace(/\?>\s*$/gmi, "")
    .split(/\r?\n/);
  const statements = [];
  for (const raw of rawLines) {
    for (const part of splitStatements(raw)) statements.push(part);
  }
  return statements;
}

function splitStatements(line) {
  const parts = [];
  let cur = "";
  let quote = "";
  for (let i = 0; i < line.length; i++) {
    const ch = line[i];
    if (quote) {
      cur += ch;
      if (ch === "\\" && i + 1 < line.length) cur += line[++i];
      else if (ch === quote) quote = "";
    } else if (ch === '"' || ch === "'" || ch === "`") {
      quote = ch;
      cur += ch;
    } else if (ch === "{" || ch === "}" || ch === ";") {
      if (cur.trim()) parts.push(cur.trim());
      cur = "";
    } else {
      cur += ch;
    }
  }
  if (cur.trim()) parts.push(cur.trim());
  return parts.length ? parts : [line];
}

function removeLineComment(line, langId) {
  let markers = {
    ruby: "#", perl: "#", yaml: "#", lua: "--", applescript: "--",
    c: "//", cpp: "//", csharp: "//", java: "//", rust: "//",
    swift: "//", kotlin: "//", php: "//"
  };
  const marker = markers[langId];
  if (!marker) return line;
  let quote = "";
  for (let i = 0; i < line.length; i++) {
    const ch = line[i];
    if (quote) {
      if (ch === "\\" && i + 1 < line.length) i++;
      else if (ch === quote) quote = "";
    } else if (ch === '"' || ch === "'") {
      quote = ch;
    } else if (line.startsWith(marker, i)) {
      return line.slice(0, i);
    }
  }
  return line;
}

function splitArgs(text) {
  const args = [];
  let cur = "";
  let quote = "";
  let depth = 0;
  for (let i = 0; i < text.length; i++) {
    const ch = text[i];
    if (quote) {
      cur += ch;
      if (ch === "\\" && i + 1 < text.length) cur += text[++i];
      else if (ch === quote) quote = "";
    } else if (ch === '"' || ch === "'") {
      quote = ch;
      cur += ch;
    } else if (ch === "(" || ch === "[" || ch === "{") {
      depth++;
      cur += ch;
    } else if (ch === ")" || ch === "]" || ch === "}") {
      depth = Math.max(0, depth - 1);
      cur += ch;
    } else if (ch === "," && depth === 0) {
      args.push(cur.trim());
      cur = "";
    } else {
      cur += ch;
    }
  }
  if (cur.trim()) args.push(cur.trim());
  return args;
}

function splitPlus(text) {
  const parts = [];
  let cur = "";
  let quote = "";
  let depth = 0;
  for (let i = 0; i < text.length; i++) {
    const ch = text[i];
    if (quote) {
      cur += ch;
      if (ch === "\\" && i + 1 < text.length) cur += text[++i];
      else if (ch === quote) quote = "";
    } else if (ch === '"' || ch === "'") {
      quote = ch;
      cur += ch;
    } else if (ch === "(" || ch === "[" || ch === "{") {
      depth++;
      cur += ch;
    } else if (ch === ")" || ch === "]" || ch === "}") {
      depth = Math.max(0, depth - 1);
      cur += ch;
    } else if (ch === "+" && depth === 0) {
      parts.push(cur.trim());
      cur = "";
    } else {
      cur += ch;
    }
  }
  if (cur.trim()) parts.push(cur.trim());
  return parts;
}

function unquote(text) {
  const q = text[0];
  let body = text.slice(1, -1);
  body = body
    .replace(/\\n/g, "\n")
    .replace(/\\t/g, "\t")
    .replace(/\\"/g, '"')
    .replace(/\\'/g, "'")
    .replace(/\\\\/g, "\\");
  return q === '"' || q === "'" || q === "`" ? body : text;
}

function interpolate(text, env) {
  return text
    .replace(/\$\{([A-Za-z_$][\w$]*)\}/g, (_, name) => stringifyValue(env[name] ?? ""))
    .replace(/\\\(([A-Za-z_][\w]*)\)/g, (_, name) => stringifyValue(env[name] ?? ""))
    .replace(/\$([A-Za-z_][\w]*)/g, (_, name) => stringifyValue(env[name] ?? ""));
}

function stringifyValue(value) {
  if (value === undefined || value === null) return "";
  if (typeof value === "object") {
    try { return JSON.stringify(value); } catch (err) { return String(value); }
  }
  return String(value);
}

function evalPolyExpr(expr, env) {
  if (expr == null) return "";
  let e = String(expr).trim()
    .replace(/;$/g, "")
    .replace(/^\((.*)\)$/s, "$1")
    .replace(/^\$([A-Za-z_][\w]*)$/, "$1")
    .replace(/^(?:new\s+)?String\((.*)\)$/s, "$1");
  if (!e) return "";
  if ((e[0] === '"' && e.endsWith('"')) || (e[0] === "'" && e.endsWith("'")) || (e[0] === "`" && e.endsWith("`"))) {
    return interpolate(unquote(e), env);
  }
  if (/^-?\d+(?:\.\d+)?$/.test(e)) return Number(e);
  if (/^(true|false)$/i.test(e)) return /^true$/i.test(e);
  if (/^nil|null|None$/.test(e)) return "";
  if (Object.prototype.hasOwnProperty.call(env, e)) return env[e];
  const concat = splitConcat(e);
  if (concat.length > 1) {
    return concat.map((part) => stringifyValue(evalPolyExpr(part, env))).join("");
  }
  const plus = splitPlus(e);
  if (plus.length > 1) {
    const values = plus.map((part) => evalPolyExpr(part, env));
    return values.some((v) => typeof v === "string") ? values.map(stringifyValue).join("") : values.reduce((a, b) => Number(a) + Number(b), 0);
  }
  const math = e.replace(/\b([A-Za-z_][\w]*)\b/g, (name) => {
    if (Object.prototype.hasOwnProperty.call(env, name) && typeof env[name] === "number") return String(env[name]);
    return name;
  });
  if (/^[\d+\-*/% ().]+$/.test(math)) {
    try { return Function('"use strict"; return (' + math + ')')(); } catch (err) {}
  }
  return e;
}

function splitConcat(text) {
  const parts = [];
  let cur = "";
  let quote = "";
  for (let i = 0; i < text.length; i++) {
    const ch = text[i];
    if (quote) {
      cur += ch;
      if (ch === "\\" && i + 1 < text.length) cur += text[++i];
      else if (ch === quote) quote = "";
    } else if (ch === '"' || ch === "'" || ch === "`") {
      quote = ch;
      cur += ch;
    } else if (text.startsWith("..", i)) {
      parts.push(cur.trim());
      cur = "";
      i++;
    } else if ((ch === "." || ch === "&") && (/\s/.test(text[i - 1] || "") || /\s/.test(text[i + 1] || ""))) {
      parts.push(cur.trim());
      cur = "";
    } else {
      cur += ch;
    }
  }
  if (cur.trim()) parts.push(cur.trim());
  return parts.filter(Boolean);
}

function applyFormat(fmt, args, env) {
  let i = 0;
  let out = interpolate(unquote(fmt.trim()), env);
  out = out.replace(/%[sdifv]/g, () => stringifyValue(evalPolyExpr(args[i++] ?? "", env)));
  out = out.replace(/\{\}/g, () => stringifyValue(evalPolyExpr(args[i++] ?? "", env)));
  out = out.replace(/\{(\d+)\}/g, (_, n) => stringifyValue(evalPolyExpr(args[Number(n)] ?? "", env)));
  return out;
}

function rememberAssignment(line, env) {
  const patterns = [
    /^\s*(?:let\s+mut|let|var|const|val|auto|int|long|short|float|double|char|bool|boolean|String|string|final|static|mut|Dim|my|our|local)\s+\$?([A-Za-z_][\w]*)\s*(?::[^=]+)?=\s*(.+?)\s*;?$/,
    /^\s*set\s+([A-Za-z_][\w]*)\s+to\s+(.+?)\s*$/i,
    /^\s*\$([A-Za-z_][\w]*)\s*=\s*(.+?)\s*;?$/,
    /^\s*([A-Za-z_][\w]*)\s*:=\s*(.+?)\s*;?$/,
    /^\s*([A-Za-z_][\w]*)\s*=\s*(.+?)\s*;?$/
  ];
  for (const pattern of patterns) {
    const m = line.match(pattern);
    if (m && !/^(if|while|for|switch|return|echo|print|puts|display|log)$/.test(m[1])) {
      env[m[1]] = evalPolyExpr(m[2], env);
      return m[1];
    }
  }
  return null;
}

function extractPrint(line, langId, env) {
  let m;
  const cleaned = line.trim().replace(/;$/, "");
  if ((m = cleaned.match(/^(?:std::)?cout\s*<<\s*(.+)$/))) {
    return m[1].split(/<<|<</).map((part) => part.trim()).filter((part) => part && part !== "endl" && part !== "std::endl").map((part) => stringifyValue(evalPolyExpr(part, env))).join("");
  }
  if ((m = cleaned.match(/^(?:printf|fmt\.Printf|Console\.WriteLine|Console\.Write|println!)\s*\((.*)\)$/s))) {
    const args = splitArgs(m[1]);
    return applyFormat(args.shift() ?? '""', args, env);
  }
  if ((m = cleaned.match(/^(?:System\.out\.println|System\.out\.print|fmt\.Println|fmt\.Print|println|print|puts|echo|debugPrint|dump)\s*\((.*)\)$/s))) {
    const args = splitArgs(m[1]);
    return args.map((arg) => stringifyValue(evalPolyExpr(arg, env))).join(" ");
  }
  if ((m = cleaned.match(/^println!\s*\((.*)\)$/s))) {
    const args = splitArgs(m[1]);
    return applyFormat(args.shift() ?? '""', args, env);
  }
  if ((m = cleaned.match(/^(?:puts|print)\s+(.+)$/s))) {
    return stringifyValue(evalPolyExpr(m[1], env));
  }
  if ((m = cleaned.match(/^echo\s+(.+)$/s))) {
    return splitArgs(m[1]).map((arg) => stringifyValue(evalPolyExpr(arg, env))).join(" ");
  }
  if ((m = cleaned.match(/^(?:display dialog|display alert|log|return)\s+(.+)$/i))) {
    return stringifyValue(evalPolyExpr(m[1], env));
  }
  return null;
}

function summarizeNonCode(code, langId) {
  const lines = code.split(/\r?\n/).filter((line) => line.trim().length > 0);
  if (langId === "yaml") {
    const keys = [];
    for (const line of lines) {
      const m = line.match(/^\s*([A-Za-z0-9_.-]+)\s*:/);
      if (m) keys.push(m[1]);
    }
    return "YAML loaded locally: " + lines.length + " non-empty lines"
      + (keys.length ? "\nkeys: " + keys.slice(0, 40).join(", ") : "") + "\n";
  }
  if (langId === "text") {
    return code + (code.endsWith("\n") ? "" : "\n");
  }
  return "";
}

function executePolyglot(code, langId, debug) {
  const env = {};
  const out = [];
  const trace = [];
  const lines = stripPolyglotNoise(code, langId);
  if (debug) trace.push("Local Gesko polyglot trace for " + (polyglotNames[langId] || langId) + "\n");
  for (let i = 0; i < lines.length; i++) {
    let line = removeLineComment(lines[i], langId).trim();
    if (!line || line === "{" || line === "}" || line === "end" || line === "then" || line === "do") continue;
    if (/^(import|package|using|namespace|class|public|private|protected|static|fun\s+main|func\s+main|fn\s+main|function\s+main|sub\s+main|module|interface|struct|enum)\b/.test(line)) {
      if (debug) trace.push("[debug] line " + (i + 1) + ": " + line + "\n");
      continue;
    }
    const assigned = rememberAssignment(line, env);
    if (assigned) {
      if (debug) trace.push("[debug] line " + (i + 1) + ": " + assigned + "=" + stringifyValue(env[assigned]) + "\n");
      continue;
    }
    const printed = extractPrint(line, langId, env);
    if (printed !== null) {
      if (debug) trace.push("[debug] line " + (i + 1) + ": output\n");
      out.push(String(printed));
    } else if (debug) {
      trace.push("[debug] line " + (i + 1) + ": " + line + "\n");
    }
  }
  let body = out.length ? out.join("\n") + "\n" : summarizeNonCode(code, langId);
  if (!body) body = "Program completed locally with no printed output.\n";
  return (debug ? trace.join("") + "\n" : "") + body;
}

async function runPolyglot(code, langId) {
  try {
    send("info", "Using bundled local Gesko polyglot runner for " + (polyglotNames[langId] || langId) + ".\n");
    send("out", executePolyglot(code, langId, false));
    send("done", "0");
  } catch (err) {
    send("err", (err && err.stack ? err.stack : err) + "\n");
    send("done", "1");
  }
}

async function debugPolyglot(code, langId) {
  try {
    send("info", "Using bundled local Gesko polyglot debugger for " + (polyglotNames[langId] || langId) + ".\n");
    send("out", executePolyglot(code, langId, true));
    send("done", "0");
  } catch (err) {
    send("err", (err && err.stack ? err.stack : err) + "\n");
    send("done", "1");
  }
}

window.GeskoRunner = {
  runPython, checkPython, debugPython,
  runJavaScript, checkJavaScript, debugJavaScript,
  runGo, runPolyglot, debugPolyglot
};
send("ready", "ready");
</script>
